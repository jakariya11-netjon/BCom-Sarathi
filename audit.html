<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Auditing Units - ExamBoost</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f5f7fa;
            --primary: #2e7d32;
            /* Green Theme */
            --accent: #66bb6a;
            --grad: linear-gradient(135deg, #2e7d32, #81c784);
            --line-color: #c8e6c9;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Google Sans', sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-nav {
            width: 100%;
            max-width: 480px;
            padding: 16px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--bg);
        }

        .back-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            text-decoration: none;
            color: #1a1c1e;
        }

        header {
            width: 100%;
            max-width: 480px;
            padding: 10px 24px 20px;
        }

        header h1 {
            margin: 0;
            font-size: 26px;
            color: var(--primary);
        }

        header p {
            margin: 4px 0 0;
            font-size: 15px;
            color: #555;
        }

        .divider-section {
            width: 100%;
            max-width: 480px;
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .divider-section span {
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
        }

        .line {
            flex: 1;
            height: 1px;
            background: var(--line-color);
        }

        .list-container {
            width: 100%;
            max-width: 480px;
            padding: 0 16px 40px;
        }

        .unit-item {
            display: flex;
            align-items: center;
            padding: 16px;
            margin-bottom: 10px;
            background: white;
            border-radius: 20px;
            text-decoration: none;
            border: 1px solid #e0e0e0;
        }

        .unit-number {
            width: 38px;
            height: 38px;
            background: var(--grad);
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            font-weight: bold;
        }

        .unit-title {
            font-size: 15px;
            color: #263238;
        }

        footer {
            padding: 20px;
            font-size: 11px;
            color: #888;
        }
    </style>
</head>

<body>

    <nav class="top-nav">
        <a href="javascript:history.back()" class="back-btn">←</a>
    </nav>

    <header>
        <h1>Auditing</h1>
        <p>Complete Syllabus · BCom</p>
    </header>

    <div class="divider-section">
        <span>Units to Study</span>
        <div class="line"></div>
    </div>

    <main class="list-container">
        <a href="ADITING.pdf" class="unit-item">
            <div class="unit-number">S</div>
            <div class="unit-title">Sessional Syllabus</div>

        <a href="audit-unit1.html" class="unit-item">
            <div class="unit-number">1</div>
            <div class="unit-title">Auditing Concepts</div>
        </a>

        <a href="audit-unit2.html" class="unit-item">
            <div class="unit-number">2</div>
            <div class="unit-title">Internal Control System</div>
        </a>

        <a href="audit-unit3.html" class="unit-item">
            <div class="unit-number">3</div>
            <div class="unit-title">Audit Sampling</div>
        </a>

        <a href="audit-unit4.html" class="unit-item">
            <div class="unit-number">4</div>
            <div class="unit-title">Audit Procedure</div>
        </a>

        <a href="audit-unit5.html" class="unit-item">
            <div class="unit-number">5</div>
            <div class="unit-title">Audit Report</div>
        </a>

    </main>

    <footer>
        DESIGNED BY JAKARIYA
    </footer>

</body>

</html>
