<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Management Notes</title>
    <style>
        :root {
            --bg: #fffbfc;
            --grad-marketing: linear-gradient(135deg, #e91e63, #ff6090);
            --line-color: #fce4ec;
            --dark-pink: #880e4f;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Top Bar */
        .top-nav {
            width: 100%;
            max-width: 450px;
            padding: 16px;
            display: flex;
            align-items: center;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            text-decoration: none;
            color: #1a1c1e;
            font-size: 20px;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* Header Section */
        header {
            width: 100%;
            max-width: 450px;
            padding: 10px 24px 20px 24px;
            text-align: left;
        }

        header h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 800;
            color: var(--dark-pink);
            letter-spacing: -1px;
        }

        header p {
            margin: 8px 0 0 0;
            font-size: 14px;
            color: #ff4081;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Label Section */
        .divider-section {
            width: 100%;
            max-width: 450px;
            padding: 10px 24px 25px 24px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .divider-section span {
            font-size: 13px;
            font-weight: 700;
            color: #e91e63;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            white-space: nowrap;
        }

        .line {
            flex: 1;
            height: 1px;
            background-color: #f8bbd0;
        }

        /* The Button Area */
        .button-container {
            width: 100%;
            max-width: 450px;
            padding: 0 16px;
        }

        .subject-btn {
            display: flex;
            align-items: center;
            padding: 20px;
            margin-bottom: 12px;
            border-radius: 24px;
            text-decoration: none;
            color: white;
            background: var(--grad-marketing);
            box-shadow: 0 8px 20px rgba(233, 30, 99, 0.2);
            transition: transform 0.2s ease;
        }

        .icon-box {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-right: 16px;
            backdrop-filter: blur(4px);
        }

        .btn-text h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            line-height: 1.2;
        }

        .btn-text p {
            margin: 4px 0 0 0;
            font-size: 12px;
            opacity: 0.9;
        }

        .subject-btn:active {
            transform: scale(0.96);
        }

        footer {
            margin-top: auto;
            padding: 40px 0;
            color: var(--dark-pink);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-align: center;
            opacity: 0.5;
        }
    </style>
</head>

<body>

    <div class="top-nav">
        <a href="#" class="back-btn">←</a>
    </div>

    <header>
        <h1>Operation Research in Business</h1>
        <p>Notes by Sarat</p>
    </header>

    <div class="divider-section">
        <span>B.Com 6th Sem</span>
        <div class="line"></div>
    </div>

    <div class="button-container">
        <a href="orb_11zon.pdf" class="subject-btn">
            <div class="icon-box">📖</div>
            <div class="btn-text">
                <h2>Click here for Notes</h2>
                <p>Full PDF Study Material</p>
                <h2>date for class PDUAM, Tulungia</h2>
                <p>26/02/2026 to 04/04/2026</p>
            </div>
        </a>
    </div>

    <footer>GAUHATI UNIVERSITY • 2026</footer>

</body>

</html>
