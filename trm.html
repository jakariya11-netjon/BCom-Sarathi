<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>TRM Units - ExamBoost</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f8faf9;
            --grad-finance: linear-gradient(135deg, #11998e, #38ef7d);
            --line-color: #e0e2ec;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Google Sans', sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Android Navigation Bar */
        .top-nav {
            width: 100%;
            max-width: 450px;
            padding: 16px;
            display: flex;
            align-items: center;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            text-decoration: none;
            color: #1a1c1e;
            transition: background 0.2s;
        }

        .back-btn:active {
            background: #e2e8e4;
        }

        header {
            width: 100%;
            max-width: 450px;
            padding: 10px 24px 20px 24px;
            text-align: left;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            color: #064e3b;
            letter-spacing: -0.5px;
        }

        header p {
            margin: 4px 0 0 0;
            font-size: 15px;
            color: #374151;
        }

        .divider-section {
            width: 100%;
            max-width: 450px;
            padding: 10px 24px 25px 24px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .divider-section span {
            font-size: 13px;
            font-weight: 700;
            color: #059669;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            white-space: nowrap;
        }

        .line {
            flex: 1;
            height: 1px;
            background-color: #d1d5db;
        }

        .button-container {
            width: 100%;
            max-width: 450px;
            padding: 0 16px;
        }

        /* Unit Row Style */
        .unit-btn {
            display: flex;
            align-items: center;
            padding: 20px;
            margin-bottom: 12px;
            border-radius: 24px;
            text-decoration: none;
            color: #1a1c1e;
            background: white;
            border: 1px solid #e0e0e0;
            transition: transform 0.1s;
        }

        .unit-num {
            width: 44px;
            height: 44px;
            background: var(--grad-finance);
            color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            margin-right: 16px;
        }

        .unit-info {
            flex: 1;
        }

        .unit-info h2 {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
            color: #1a1c1e;
        }

        .unit-info p {
            margin: 2px 0 0 0;
            font-size: 13px;
            color: #6b7280;
        }

        .unit-btn:active {
            transform: scale(0.97);
            background-color: #f1f3f1;
        }

        footer {
            margin-top: auto;
            padding: 40px 0;
            color: #6b7280;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-align: center;
        }
    </style>
</head>

<body>

    <nav class="top-nav">
        <a href="finance.html" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a>
    </nav>

    <header>
        <h1>Treasury & Risk</h1>
        <p>BCom 6th Semester Study Units</p>
    </header>

    <div class="divider-section">
        <span>Select Unit</span>
        <div class="line"></div>
    </div>

    <main class="button-container">

        <a href="trm-unit1.html" class="unit-btn">
            <div class="unit-num">1</div>
            <div class="unit-info">
                <h2>Financial Markets</h2>
                <p>Structure and Functions</p>
            </div>
        </a>

        <a href="trm-unit2.html" class="unit-btn">
            <div class="unit-num">2</div>
            <div class="unit-info">
                <h2>Treasury Management</h2>
                <p>Role and Cash Management</p>
            </div>
        </a>

        <a href="trm-unit3.html" class="unit-btn">
            <div class="unit-num">3</div>
            <div class="unit-info">
                <h2>Control & Regulation</h2>
                <p>Legal framework & RBI rules</p>
            </div>
        </a>

        <a href="trm-unit4.html" class="unit-btn">
            <div class="unit-num">4</div>
            <div class="unit-info">
                <h2>Risk Management</h2>
                <p>Techniques & Analysis</p>
            </div>
        </a>

    </main>

    <footer>
        © 2026 EXAMBOOST | MADE BY JAKARIYA
    </footer>

</body>

</html>
