<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Accounting Major - ExamBoost</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f9f8ff;
            --grad-accounting: linear-gradient(135deg, #6f42c1, #a370f7);
            /* Professional Purple */
            --line-color: #ede7f6;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Google Sans', sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Android Navigation Bar */
        .top-nav {
            width: 100%;
            max-width: 450px;
            padding: 16px;
            display: flex;
            align-items: center;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            text-decoration: none;
            color: #1a1c1e;
            transition: background 0.2s;
        }

        .back-btn:active {
            background: #ede7f6;
        }

        header {
            width: 100%;
            max-width: 450px;
            padding: 10px 24px 20px 24px;
            text-align: left;
        }

        header h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 700;
            color: #311b92;
            /* Deep Indigo */
            letter-spacing: -1px;
        }

        header p {
            margin: 4px 0 0 0;
            font-size: 16px;
            color: #43474e;
        }

        .divider-section {
            width: 100%;
            max-width: 450px;
            padding: 10px 24px 25px 24px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .divider-section span {
            font-size: 13px;
            font-weight: 700;
            color: #6f42c1;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            white-space: nowrap;
        }

        .line {
            flex: 1;
            height: 1px;
            background-color: #d1c4e9;
        }

        .button-container {
            width: 100%;
            max-width: 450px;
            padding: 0 16px;
        }

        .subject-btn {
            display: flex;
            align-items: center;
            padding: 18px 20px;
            margin-bottom: 12px;
            border-radius: 24px;
            text-decoration: none;
            color: white;
            background: var(--grad-accounting);
            box-shadow: 0 8px 15px rgba(111, 66, 193, 0.15);
            transition: transform 0.1s;
        }

        .icon-box {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-right: 16px;
            backdrop-filter: blur(4px);
        }

        .btn-text {
            flex: 1;
        }

        .btn-text h2 {
            margin: 0;
            font-size: 17px;
            font-weight: 700;
            line-height: 1.2;
        }

        .subject-btn:active {
            transform: scale(0.96);
        }

        footer {
            margin-top: auto;
            padding: 40px 0;
            color: #512da8;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-align: center;
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <nav class="top-nav">
        <a href="index.html" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a>
    </nav>

    <header>
        <h1>Accounting Major</h1>
        <p>BCom 6th Semester</p>
    </header>

    <div class="divider-section">
        <span>Select Subject</span>
        <div class="line"></div>
    </div>

    <main class="button-container">

        <a href="ib.html" class="subject-btn">
            <div class="icon-box">🌍</div>
            <div class="btn-text">
                <h2>International Business</h2>
            </div>
        </a>

        <a href="orb.html" class="subject-btn">
            <div class="icon-box">📊</div>
            <div class="btn-text">
                <h2>Operations Research</h2>
            </div>
        </a>

        <a href="ca.html" class="subject-btn">
            <div class="icon-box">💻</div>
            <div class="btn-text">
                <h2>Computerised Accounting</h2>
            </div>
        </a>

        <a href="audit.html" class="subject-btn">
            <div class="icon-box">📑</div>
            <div class="btn-text">
                <h2>Auditing & Assurance</h2>
            </div>
        </a>

        <a href="vac.html" class="subject-btn">
            <div class="icon-box">🎯</div>
            <div class="btn-text">
                <h2>Business Etiquette (VAC)</h2>
            </div>
        </a>

    </main>

    <footer>
        © 2026 EXAMBOOST | MADE BY JAKARIYA
    </footer>

</body>

</html>
