<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ExamBoost BCom VI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #fdfbff;
            --grad-finance: linear-gradient(135deg, #00b09b, #96c93d);
            --grad-accounting: linear-gradient(135deg, #4facfe, #00f2fe);
            --grad-hrm: linear-gradient(135deg, #667eea, #764ba2);
            --grad-marketing: linear-gradient(135deg, #ff9a9e, #fecfef);
            --line-color: #e0e2ec;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Google Sans', sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 450px;
            padding: 50px 24px 20px 24px;
            text-align: left;
        }

        header h1 {
            margin: 0;
            font-size: 36px;
            font-weight: 700;
            color: #1a1c1e;
            letter-spacing: -1px;
        }

        header p {
            margin: 4px 0 0 0;
            font-size: 16px;
            color: #43474e;
        }

        /* The "Select Major" Section with Line */
        .divider-section {
            width: 100%;
            max-width: 450px;
            padding: 10px 24px 25px 24px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .divider-section span {
            font-size: 14px;
            font-weight: 700;
            color: #0b57d0;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            white-space: nowrap;
        }

        .line {
            flex: 1;
            height: 1px;
            background-color: var(--line-color);
        }

        .button-container {
            width: 100%;
            max-width: 450px;
            padding: 0 16px;
        }

        .major-btn {
            display: flex;
            align-items: center;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 28px;
            text-decoration: none;
            color: white;
            position: relative;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.06);
            transition: transform 0.1s;
        }

        .btn-finance {
            background: var(--grad-finance);
        }

        .btn-accounting {
            background: var(--grad-accounting);
        }

        .btn-hrm {
            background: var(--grad-hrm);
        }

        .btn-marketing {
            background: var(--grad-marketing);
            color: #4a001a;
        }

        .icon-circle {
            width: 52px;
            height: 52px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 18px;
            backdrop-filter: blur(4px);
        }

        .btn-text h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
        }

        .btn-text p {
            margin: 2px 0 0 0;
            font-size: 13px;
            opacity: 0.9;
        }

        .major-btn:active {
            transform: scale(0.96);
        }

        footer {
            margin-top: auto;
            padding: 40px 0;
            color: #74777f;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-align: center;
        }
    </style>
</head>

<body>

    <header>
        <h1>ExamBoost</h1>
        <p>BCom 6th Semester</p>
    </header>

    <div class="divider-section">
        <span>Select Major</span>
        <div class="line"></div>
    </div>

    <main class="button-container">

        <a href="finance.html" class="major-btn btn-finance">
            <div class="icon-circle">💰</div>
            <div class="btn-text">
                <h2>Finance</h2>
                <p>Major Course Content</p>
            </div>
        </a>

        <a href="accounting.html" class="major-btn btn-accounting">
            <div class="icon-circle">📊</div>
            <div class="btn-text">
                <h2>Accounting</h2>
                <p>Corporate & Costing</p>
            </div>
        </a>

        <a href="HRM.html" class="major-btn btn-hrm">
            <div class="icon-circle">👨‍💼</div>
            <div class="btn-text">
                <h2>HRM</h2>
                <p>Human Resource Management</p>
            </div>
        </a>

        <a href="marketing.html" class="major-btn btn-marketing">
            <div class="icon-circle">📢</div>
            <div class="btn-text">
                <h2>Marketing</h2>
                <p>Digital & Service Marketing</p>
            </div>
        </a>

    </main>
    <div class="back">
        <a href="index.html">⬅HOME</a>
    </div>
    <footer>
        MADE BY JAKARIYA
    </footer>

</body>

</html>
