<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Consumer Affairs - ExamBoost</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f5f7fa;
            --primary: #00695c;
            /* NEW color for Consumer Affairs */
            --accent: #00897b;
            --grad: linear-gradient(135deg, #00695c, #26a69a);
            --line-color: #cfd8dc;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: 'Google Sans', sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-nav {
            width: 100%;
            max-width: 480px;
            padding: 16px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--bg);
        }

        .back-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            text-decoration: none;
            color: #1a1c1e;
        }

        header {
            width: 100%;
            max-width: 480px;
            padding: 10px 24px 20px 24px;
        }

        header h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            color: var(--primary);
        }

        header p {
            margin: 4px 0 0 0;
            font-size: 15px;
            color: #546e7a;
        }

        .divider-section {
            width: 100%;
            max-width: 480px;
            padding: 10px 24px 20px 24px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .divider-section span {
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
        }

        .line {
            flex: 1;
            height: 1px;
            background-color: var(--line-color);
        }

        .list-container {
            width: 100%;
            max-width: 480px;
            padding: 0 16px 50px 16px;
        }

        .unit-item {
            display: flex;
            align-items: center;
            padding: 16px 18px;
            margin-bottom: 10px;
            background: white;
            border-radius: 20px;
            text-decoration: none;
            border: 1px solid #eceff1;
        }

        .unit-number {
            min-width: 38px;
            height: 38px;
            background: var(--grad);
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-right: 16px;
        }

        .unit-title {
            flex: 1;
            font-size: 15px;
            color: #263238;
        }

        footer {
            padding: 30px;
            font-size: 11px;
            color: #90a4ae;
            text-align: center;
        }
    </style>
</head>

<body>

    <nav class="top-nav">
        <a href="javascript:history.back()" class="back-btn">←</a>
    </nav>

    <header>
        <h1>Consumer Affairs</h1>
        <p>B.Com 6th Semester · Important Topics</p>
    </header>

    <div class="divider-section">
        <span>Study Section</span>
        <div class="line"></div>
    </div>

    <main class="list-container">

        <!-- SESSIONAL LINK -->
        

    </main>

    <footer>
        DESIGNED BY JAKARIYA
    </footer>

</body>

</html>
