<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ExamBoost BCom VI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #fdfbff;
            --grad-finance: linear-gradient(135deg, #00b09b, #96c93d);
            --grad-accounting: linear-gradient(135deg, #4facfe, #00f2fe);
            --grad-hrm: linear-gradient(135deg, #667eea, #764ba2);
            --grad-marketing: linear-gradient(135deg, #ff9a9e, #fecfef);
            --line-color: #e0e2ec;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Google Sans', sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 450px;
            padding: 50px 24px 20px;
        }

        header h1 {
            font-size: 36px;
            margin: 0;
        }

        header p {
            margin: 0;
            color: gray;
        }

        .divider-section {
            width: 100%;
            max-width: 450px;
            padding: 10px 24px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .divider-section span {
            font-size: 14px;
            font-weight: 700;
            color: #0b57d0;
        }

        .line {
            flex: 1;
            height: 1px;
            background-color: var(--line-color);
        }

        .button-container {
            width: 100%;
            max-width: 450px;
            padding: 0 16px;
        }

        .major-btn {
            display: flex;
            align-items: center;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 28px;
            text-decoration: none;
            color: white;
        }

        .btn-finance { background: var(--grad-finance); }
        .btn-accounting { background: var(--grad-accounting); }
        .btn-hrm { background: var(--grad-hrm); }
        .btn-marketing { background: var(--grad-marketing); color:#000;}

        .icon-circle {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.3);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
        }

        footer {
            margin-top: auto;
            padding: 40px;
            font-size: 12px;
        }
    </style>
</head>

<body>

<header>
    <h1>ExamBoost</h1>
    <p>BCom 6th Semester</p>
</header>

<div class="divider-section">
    <span>Select Major</span>
    <div class="line"></div>
</div>

<main class="button-container">
    <a href="finance.html" class="major-btn btn-finance">
        <div class="icon-circle">💰</div>
        <div><h2>Finance</h2></div>
    </a>

    <a href="accounting.html" class="major-btn btn-accounting">
        <div class="icon-circle">📊</div>
        <div><h2>Accounting</h2></div>
    </a>

    <a href="HRM.html" class="major-btn btn-hrm">
        <div class="icon-circle">👨‍💼</div>
        <div><h2>HRM</h2></div>
    </a>

    <a href="marketing.html" class="major-btn btn-marketing">
        <div class="icon-circle">📢</div>
        <div><h2>Marketing</h2></div>
    </a>
</main>

<footer>MADE BY JAKARIYA</footer>

<!-- 🔥 CHATBOT -->

<div onclick="toggleChat()" style="
position: fixed;
bottom: 20px;
right: 20px;
background: #ff2e63;
color: white;
width: 60px;
height: 60px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 24px;
cursor: pointer;">
💬
</div>

<div id="chatBox" style="
display:none;
position:fixed;
bottom:90px;
right:20px;
width:300px;
height:400px;
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 0 10px rgba(0,0,0,0.3);">

<h3>Ask AI 🤖</h3>
<div id="chat" style="height:260px; overflow:auto;"></div>

<input id="msg" placeholder="Ask something..." style="width:70%;">
<button onclick="send()">Send</button>
</div>

<script>
function toggleChat(){
 let box=document.getElementById("chatBox");
 box.style.display = box.style.display==="none"?"block":"none";
}

async function send(){
 let input=document.getElementById("msg").value;
 let chat=document.getElementById("chat");

 chat.innerHTML += "<p><b>You:</b> "+input+"</p>";

 let res = await fetch("https://b-com-sarathi.vercel.app/api/chat", {
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({message: input})
 });

 let data=await res.json();
 let reply=data.choices[0].message.content;

 chat.innerHTML += "<p><b>AI:</b> "+reply+"</p>";
}
</script>

</body>
</html>
