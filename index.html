<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ExamBoost Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-green: #27ae60;
            --dark-green: #1e8449;
            --accent-blue: #2980b9;
            --dark-blue: #2471a3;
            --bg-color: #f0f2f5;
            --text-main: #2c3e50;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-color);
        }

        /* Header */
        .header {
            background: var(--primary-green);
            color: white;
            padding: 20px;
            font-size: 22px;
            font-weight: 600;
            text-align: center;
        }

        /* Hero */
        .hero {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* Card */
        .welcome-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .highlight {
            color: var(--primary-green);
        }

        /* Links as Button */
        .btn {
            padding: 14px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            display: block;
            margin-bottom: 10px;
            color: white;
        }

        /* Colors */
        .btn-primary {
            background: var(--primary-green);
        }

        .btn-routine {
            background: var(--accent-blue);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 15px;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <div class="header">
        📘 ExamBoost
    </div>

    <div class="hero">
        <div class="welcome-card">

            <h1>Welcome to <span class="highlight">ExamBoost</span> 👋</h1>

            <p>
                B.Com 6th Semester <br>
                All Major Subjects, Syllabus & Questions
            </p>

            <!-- ✅ SIMPLE LINKS -->
            <a href="index2.html" class="btn btn-primary">
                Select Major Subject
            </a>

            <a href="routine.html" class="btn btn-routine">
                View Sessional Routine
            </a>

        </div>
    </div>

    <div class="footer">
        © 2026 ExamBoost
    </div>

</body>

</html>
